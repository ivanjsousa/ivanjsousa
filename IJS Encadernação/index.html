<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Planner do Encadernador</title>

	<link rel="stylesheet" href="reset.css">
	<link rel="stylesheet" href="style.css">
</head>
<body>

	<h1 align="center">Planner do Encadernado, Conservador e Restaurador</h1>
	<main>
		<form>
			<h2>BRIEFING</h2>
			<label for="porque">Por Que?</label>
			<textarea cols="30" rows="10" id="porque"></textarea>
			<label for="oque">O Que?</label>
			<textarea cols="30" rows="10" id="oque"></textarea>
			<label for="quem">Quem?</label>
			<textarea cols="30" rows="10" id="quem"></textarea>
			<label for="quando">Quando?</label>
			<textarea cols="30" rows="10" id="quando"></textarea>
			<label for="comquem">Com Quem?</label>
			<textarea cols="30" rows="10" id="comquem"></textarea>

		<h2>PESQUISA</h2>
			<p>Marca</p>
			<p>Valores</p>
			<p>Mood / Clima</p>
			<p>Audiência</p>
			<p>Identidade</p>
			<p>Elementos</p>

		<h2>CONCEPÇÃO</h2>
			<p>Painel Semântico</p>
			<p>Paleta de Cores</p>
			<p>Tipografia</p>
			<p>Rascunho</p>

		</form>
		
	</main>
		

</body>
</html>
